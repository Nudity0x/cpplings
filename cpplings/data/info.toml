# cpplings exercise manifest.
#
# Order here is the order learners progress through. Each exercise has:
#   name  - unique, matches the .cpp filename (without extension)
#   dir   - section directory under exercises/ and solutions/
#   test  - true if the exercise uses cpplings_test.hpp (assertions), false if
#           it provides its own main(). Informational: the runner compiles and
#           runs every exercise regardless.
#   hint  - shown on demand (press 'h' in watch mode, or `cpplings hint`).

format_version = 1

welcome_message = """
Welcome to cpplings!

Fix each C++ exercise so it compiles and its tests pass, then remove the
"// I AM NOT DONE" comment to advance. Exercises get checked automatically
when you save. Press 'h' for a hint, 'l' to list exercises, 'q' to quit.
"""

final_message = """
You reached the end of cpplings — 97 exercises across the C++ core, resource
management, OOP, the STL, and the idioms that make C++ code correct and modern.
Nice work. Go build something.
"""

