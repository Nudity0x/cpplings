name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Linux/macOS runners already ship g++/clang++. On Windows, activate the
      # MSVC (cl.exe) developer environment so the compiler-backed tests run
      # instead of skipping.
      - name: Activate MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install cpplings + test deps
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q
